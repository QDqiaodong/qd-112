# ======================================================
# Spring Boot 开发环境配置（本地运行）
# 本地开发仅绑定 IPv4 回环地址 127.0.0.1:8095
# ======================================================
server:
  address: 127.0.0.1
  port: 8095
  tomcat:
    accept-count: 100
    max-threads: 200
    min-spare-threads: 25
    connection-timeout: 60000

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3318/home_tools?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  data:
    redis:
      host: 127.0.0.1
      port: 6387
      timeout: 3000
      jedis:
        pool:
          min-idle: 5
          max-idle: 20
          max-active: 20
          max-wait: 3000

logging:
  level:
    com.home.tools: DEBUG
    org.hibernate.SQL: DEBUG
